;   boards-esp8266.ini
;
;   settings for esp8266 boards
;
;   remarks:
;       - adds ./lib/esp8266 to include path
;       - adds libraries common for all esp8266 projects to lib_deps
;
;==============================================================================
[esp8266]
;------------------------------------------------------------------------------
extends = arduino
platform = espressif8266

;------------------------------------------------------------------------------
lib_deps =
    ${arduino.lib_deps}

;------------------------------------------------------------------------------
;   basic build settings

; build_unflags =
;   -std=gnu++17
;   -std=gnu++20    allows 'constinit' to spot initialization sequence problems (?)
;   -Wno-volatile   avoid warnings within libraries when using gnu++20

build_flags =
    -I src/lib/esp8266
    ${arduino.build_flags}
	-D PIO_FRAMEWORK_ARDUINO_ESPRESSIF_SDK305
    -D MONITOR_SPEED=74880

;------------------------------------------------------------------------------
;   basic board settings

board_build.f_cpu = 160000000L
board_build.filesystem = littlefs

;   flash mode DOUT is slowest but most safe
;   see https://github.com/espressif/esptool/wiki/SPI-Flash-Modes
; board_build.flash_mode = dout

;------------------------------------------------------------------------------
;   basic serial settings

;   max. upload speed depends on board, e. g. 
;       pogo pins:  1000000
;       d1 mini:    2000000
;       witty:      3000000
upload_speed =  2000000

;   74880 is compatible with rom boot messages
monitor_speed = 74880

; monitor_filters = 
;     ${arduino.monitor_filters}
;     esp8266_exception_decoder

;==============================================================================
[d1_mini]
;------------------------------------------------------------------------------
;   wemos d1 mini

extends = esp8266
board = d1_mini

upload_speed = 1000000

build_flags =
    ${esp8266.build_flags}
    -D BOARD=d1_mini
