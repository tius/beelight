;   target-arduino.ini
;
;   common settings for arduino enviroment
;
;   see LICENSE for terms

;==============================================================================
[arduino]
;-----------------------------------------------------------------------------
framework = arduino

extra_scripts =
    pre:scripts/pio_check_litekit_contract.py
    pre:scripts/pio_build_info.py

lib_deps =
    ${env.lib_deps}

build_flags =
    ; architecture contract: include order defines header providers
    ; 1) litekit-arduino owns platform sys providers like clock and uart
    ; 2) litekit provides shared core and fallback headers
    -I lib/litekit-arduino/include
    -I lib/litekit/include

;   -D NO_GLOBAL_INSTANCES     not compatible with NeoPixelBus library

lib_ignore =
    toolkit

;   required for ansi color codes in serial monitor
monitor_flags = 
    --raw

;-----------------------------------------------------------------------------
;   see https://docs.platformio.org/en/latest/core/userguide/device/cmd_monitor.html#cmd-device-monitor-filters
;
;   direct      display ansi colors
;   time        timestamp prompt
  
monitor_filters = direct
