;   target-esp8266.ini
;
;   settings for esp8266 boards using arduino framework
;
;   see LICENSE for terms

;==============================================================================
[esp8266]
;------------------------------------------------------------------------------
extends = arduino
platform = espressif8266

;   add -Wno-volatile via CXXFLAGS for C++ files only
extra_scripts =
    ${arduino.extra_scripts}
    pre:scripts/pio_esp8266_cxx_flags.py

;------------------------------------------------------------------------------
lib_deps =
    ${arduino.lib_deps}

;------------------------------------------------------------------------------
;   basic build settings

build_unflags =
    -std=gnu++17
;   -std=gnu++17    add to build_unflags to allow -std=gnu++20 via build_flags

build_flags =
    ; architecture contract: include order defines overlay precedence
    ; 1) litekit-esp8266 can override platform-specific sys/stripe headers
    ; 2) ${arduino.build_flags} appends litekit-arduino, then litekit core
    ; do not reorder without updating lib/litekit/README.md contract section
    -I lib/litekit-esp8266/include
    ${arduino.build_flags}
    -std=gnu++20
	-D PIO_FRAMEWORK_ARDUINO_ESPRESSIF_SDK305
    -D LITE_TIMER_FREQ=1000
    -D LITE_PWM_HAS_RANGE=1
    -D LITE_PWM_HAS_FREQ=1
    -D MONITOR_SPEED=74880
;   -std=gnu++20    allows 'constinit' to spot initialization sequence problems (?)
;   -Wno-volatile   set via CXXFLAGS in extra_script (C++ only)

;------------------------------------------------------------------------------
;   basic board settings

board_build.f_cpu = 160000000L
board_build.filesystem = littlefs

;   flash mode DOUT is slowest but most safe
;   see https://github.com/espressif/esptool/wiki/SPI-Flash-Modes
; board_build.flash_mode = dout

;------------------------------------------------------------------------------
;   basic serial settings

;   max. upload speed depends on board, e. g. 
;       pogo pins:  1000000
;       d1 mini:    2000000
;       witty:      3000000
upload_speed =  2000000

;   74880 is compatible with rom boot messages
monitor_speed = 74880

monitor_filters = 
    ${arduino.monitor_filters}
    esp8266_exception_decoder

;==============================================================================
[d1_mini]
;------------------------------------------------------------------------------
;   wemos d1 mini

extends = esp8266
board = d1_mini

upload_speed = 2000000

build_flags =
    ${esp8266.build_flags}
    -D BOARD=d1_mini

;==============================================================================
[rysta]
;------------------------------------------------------------------------------
extends = esp8266

board = d1_mini
board_build.flash_mode = qio
board_build.f_flash = 80000000L

upload_speed = 4000000

build_flags =
    ${esp8266.build_flags}
    -D BOARD=rysta
